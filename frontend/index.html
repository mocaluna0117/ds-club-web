<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>データサイエンス倶楽部</title>
    <script>
      // Restore path redirected from 404.html
      (function () {
        var search = window.location.search;
        if (search[1] === 'p' && search[2] === '=') {
          var path = search.slice(3).replace(/~and~/g, '&').split('&q=');
          var url = window.location.pathname.replace(/\/$/, '') + path[0] +
            (path[1] ? '?' + path[1] : '') + window.location.hash;
          window.history.replaceState(null, null, url);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
