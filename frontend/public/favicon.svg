<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 5 76 76">
  <defs>
    <linearGradient id="hexG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f0f0"/>
      <stop offset="50%"  stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
  </defs>

  <!-- クラスター重心(50,48)から各中心を3px外側にオフセット -->

  <!-- 上の六角形 (中心: 50, 27) r=18 -->
  <polygon points="50,9 65.6,18 65.6,36 50,45 34.4,36 34.4,18"
           fill="url(#hexG)" stroke="#888" stroke-width="1" stroke-linejoin="round"/>

  <!-- 左下の六角形 (中心: 31.8, 58.5) r=18 -->
  <polygon points="31.8,40.5 47.4,49.5 47.4,67.5 31.8,76.5 16.2,67.5 16.2,49.5"
           fill="url(#hexG)" stroke="#888" stroke-width="1" stroke-linejoin="round"/>

  <!-- 右下の六角形 (中心: 68.2, 58.5) r=18 -->
  <polygon points="68.2,40.5 83.8,49.5 83.8,67.5 68.2,76.5 52.6,67.5 52.6,49.5"
           fill="url(#hexG)" stroke="#888" stroke-width="1" stroke-linejoin="round"/>
</svg>
